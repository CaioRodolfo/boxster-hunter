name: Car Hunter

on:
  schedule:
    # Hourly from 8am to 8pm Eastern (13 runs/day). GitHub cron is UTC-only
    # and doesn't observe DST, so this expression targets EDT (UTC-4):
    # 12:00-00:00 UTC == 8am-8pm EDT. When DST ends in November, swap to
    # `0 1,13-23 * * *` to keep the 8am-8pm window in EST (UTC-5).
    - cron: '0 0,12-23 * * *'
  workflow_dispatch:       # manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Restore SQLite dedup cache
        uses: actions/cache/restore@v4
        with:
          path: boxster.db
          key: boxster-db-${{ github.run_number }}
          restore-keys: boxster-db-

      - name: Run hunter
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Per-target Notion databases — see boxster_hunter/targets/<target>.py
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}                  # 986 Boxster S
          NOTION_DATABASE_ID_S3: ${{ secrets.NOTION_DATABASE_ID_S3 }}            # Audi S3 8V facelift
          NOTION_DATABASE_ID_4RUNNER: ${{ secrets.NOTION_DATABASE_ID_4RUNNER }}  # 4th gen 4Runner
          # Per-target Slack channels — one webhook per target's slack channel
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}                    # Boxster channel
          SLACK_WEBHOOK_URL_S3: ${{ secrets.SLACK_WEBHOOK_URL_S3 }}              # S3 channel
          SLACK_WEBHOOK_URL_4RUNNER: ${{ secrets.SLACK_WEBHOOK_URL_4RUNNER }}    # 4Runner channel
          # Optional cross-target channels
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: uv run python -m boxster_hunter.main

      - name: Save SQLite dedup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: boxster.db
          key: boxster-db-${{ github.run_number }}
